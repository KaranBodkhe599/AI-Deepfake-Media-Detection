<!DOCTYPE html>
<html>
<head>
  <title>Deepfake Detection Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔷 NAVBAR -->
<div class="navbar">
  <h2>Deepfake Detection System</h2>
  <a href="index.html">Home</a>
</div>

<div class="container">

  <!-- 🔍 INPUT -->
  <div class="input-box">
    <input type="text" id="url" placeholder="Paste news article URL...">
    <button class="btn" onclick="scan()">Scan</button>
  </div>

  <!-- 📊 RESULT CARDS -->
  <div class="results">
    <div class="result-card">
      <h3>🖼 Image Score</h3>
      <p id="imageScore">--</p>
    </div>

    <div class="result-card">
      <h3>📝 Text Score</h3>
      <p id="textScore">--</p>
    </div>

    <div class="result-card">
      <h3>📊 Final Score</h3>
      <p id="finalScore">--</p>
    </div>

    <div class="result-card">
      <h3>⚖️ Verdict</h3>
      <p id="verdict" class="verdict">--</p>
    </div>
  </div>

  <!-- 🧠 ANALYSIS -->
  <div class="analysis-box">

    <h2>AI Analysis</h2>
    <p id="analysisText">--</p>

    <!-- 📈 Confidence -->
    <div class="confidence-section">
      <h4>Confidence</h4>
      <p id="confidence">--</p>
      <div class="progress-bar">
        <div id="bar"></div>
      </div>
    </div>

    <!-- 🔍 Indicators -->
    <div class="keywords">
      <p>❗ Fake: <span id="fakeCount">0</span></p>
      <p>✅ Real: <span id="realCount">0</span></p>
      <p>🔗 Trusted: <span id="trustedScore">0</span></p>
    </div>

  </div>

  <!-- 📜 HISTORY -->
  <h2 class="history-title">Scan History</h2>

  <table class="history-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Image</th>
        <th>Text</th>
        <th>Final</th>
        <th>Verdict</th>
      </tr>
    </thead>

    <tbody id="historyTable">
      <tr>
        <td colspan="6">No scans yet</td>
      </tr>
    </tbody>
  </table>

</div>

<script src="script.js"></script>

</body>
</html>
